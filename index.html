<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giacenze Bobine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Colori Aziendali Personalizzati */
        .bg-ingros { background-color: #10b981 !important; color: white; } /* Verde */
        .bg-rwp { background-color: #3b82f6 !important; color: white; }    /* Blu */
        .bg-isolpack { background-color: #ef4444 !important; color: white; } /* Rosso */
        .bg-isotecnica { background-color: #f59e0b !important; color: white; } /* Arancio */
        .bg-isometal { background-color: #06b6d4 !important; color: white; }   /* Celeste */

        .azienda-tab.active { border-bottom: 4px solid #334155; color: #000; font-weight: 800; }
        .desktop-table { display: table; }
        .card-mobile { display: none; }
        @media (max-width: 768px) {
            .desktop-table { display: none; }
            .card-mobile { display: block; }
        }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .open .collapsible-content { max-height: 500px; }
        .open .arrow-icon { transform: rotate(180deg); }
        .azienda-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 900; margin-bottom: 6px; display: inline-block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto">
            <div class="px-4 h-12 flex items-center bg-slate-800 text-white">
                <span class="text-lg font-black tracking-tighter uppercase italic">
                    Giacenze<span class="text-red-500">Bobine</span>
                </span>
            </div>
            <div class="px-4 h-12 flex items-center border-b overflow-x-auto no-scrollbar bg-white">
                <div id="tab-container" class="flex space-x-6 h-full items-center text-xs font-bold text-gray-400">
                    <button onclick="changeCompany('Tutte')" id="tab-tutte" class="azienda-tab active h-full px-1 uppercase tracking-widest whitespace-nowrap">Tutte le Aziende</button>
                    </div>
            </div>
            
            <div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 bg-gray-50 border-b">
                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1 mb-1">Materiale</label>
                    <select id="fMat" onchange="applyFilters()" class="bg-white border border-gray-200 rounded-lg text-xs p-2 focus:ring-2 focus:ring-slate-800 outline-none shadow-sm"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1 mb-1">Colore</label>
                    <select id="fCol" onchange="applyFilters()" class="bg-white border border-gray-200 rounded-lg text-xs p-2 focus:ring-2 focus:ring-slate-800 outline-none shadow-sm"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1 mb-1">Larghezza</label>
                    <select id="fLar" onchange="applyFilters()" class="bg-white border border-gray-200 rounded-lg text-xs p-2 focus:ring-2 focus:ring-slate-800 outline-none shadow-sm"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-black text-gray-500 uppercase ml-1 mb-1">Spessore</label>
                    <select id="fSpe" onchange="applyFilters()" class="bg-white border border-gray-200 rounded-lg text-xs p-2 focus:ring-2 focus:ring-slate-800 outline-none shadow-sm"></select>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div class="desktop-table w-full bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <table class="w-full text-left">
                <thead class="bg-slate-100 text-slate-500 text-[10px] uppercase font-black tracking-widest border-b">
                    <tr>
                        <th class="p-4">Azienda / Info Prodotto</th>
                        <th class="p-4 text-center">Larg x Spes</th>
                        <th class="p-4 text-center text-blue-600">Disp. ML</th>
                        <th class="p-4">Lotti Fornitore</th>
                    </tr>
                </thead>
                <tbody id="main-tbody" class="divide-y text-sm italic"></tbody>
            </table>
        </div>

        <div id="mobile-container" class="card-mobile space-y-4"></div>
        <div id="loader" class="text-center py-20"><i class="fa-solid fa-sync animate-spin text-3xl text-slate-400"></i></div>
    </main>

    <script>
        let fullData = []; 
        let activeCompany = 'Tutte';

        async function init() {
            let combined = [];
            const container = document.getElementById('tab-container');
            const loader = document.getElementById('loader');
            if (!container) return;

            try {
                // Carichiamo la configurazione una volta sola con timestamp
                const timestamp = Date.now();
                const configRes = await fetch(`config.json?v=${timestamp}`);
                if (!configRes.ok) throw new Error("Config non trovato");
                const config = await configRes.json();
                const aziendeDaCaricare = config.aziende_attive;

                // Reset Tab
                container.innerHTML = `<button onclick="changeCompany('Tutte')" id="tab-tutte" class="azienda-tab active h-full px-1 uppercase tracking-widest whitespace-nowrap">Tutte le Aziende</button>`;

                // Caricamento dati in parallelo (Molto più veloce)
                const promises = aziendeDaCaricare.map(async (az) => {
                    try {
                        const response = await fetch(`data/${az.toLowerCase()}.json?v=${timestamp}`);
                        if (response.ok) {
                            const json = await response.json();
                            if (Array.isArray(json)) {
                                return json.map(item => ({
                                    ...item,
                                    azienda: az.toUpperCase(),
                                    // Assicuriamoci che larghezza e spessore siano sempre stringhe pulite
                                    larghezza: item.larghezza ? String(item.larghezza).trim() : "-",
                                    spessore: item.spessore ? String(item.spessore).trim() : "-"
                                }));
                            }
                        }
                    } catch (e) { console.warn(`Errore file ${az}`); }
                    return [];
                });

                const results = await Promise.all(promises);
                results.forEach((data, index) => {
                    if (data.length > 0) {
                        combined = combined.concat(data);
                        addTab(aziendeDaCaricare[index]);
                    }
                });
                
                fullData = combined;
                populateFilters();
                render();

            } catch (err) {
                console.error("Errore Inizializzazione:", err);
            } finally {
                if (loader) loader.style.display = 'none';
            }
        }

        function addTab(az) {
            const container = document.getElementById('tab-container');
            const btn = document.createElement('button');
            btn.id = `tab-${az.toLowerCase()}`;
            btn.className = "azienda-tab h-full px-1 uppercase tracking-tighter whitespace-nowrap";
            btn.innerText = az;
            btn.onclick = () => changeCompany(az);
            container.appendChild(btn);
        }

        function changeCompany(az) {
            activeCompany = az === 'Tutte' ? 'Tutte' : az.toUpperCase();
            document.querySelectorAll('.azienda-tab').forEach(t => t.classList.remove('active'));
            const targetId = az === 'Tutte' ? 'tab-tutte' : `tab-${az.toLowerCase()}`;
            const targetBtn = document.getElementById(targetId);
            if (targetBtn) targetBtn.classList.add('active');
            render();
        }

        function populateFilters() {
            if (!fullData.length) return;
            const getUnique = (key) => [...new Set(fullData.map(i => i[key]))].filter(Boolean).sort();
            
            fillSelect('fMat', getUnique('descrizione_tipo_materiale'), 'Materiale');
            fillSelect('fCol', getUnique('descrizione_colore'), 'Colore');
            fillSelect('fLar', getUnique('larghezza'), 'Larghezza');
            fillSelect('fSpe', getUnique('spessore'), 'Spessore');
        }

        function fillSelect(id, list, label) {
            const s = document.getElementById(id);
            if (!s) return;
            s.innerHTML = `<option value="">Scegli ${label}...</option>` + 
                          list.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function render() {
            const fMat = document.getElementById('fMat').value;
            const fCol = document.getElementById('fCol').value;
            const fLar = document.getElementById('fLar').value;
            const fSpe = document.getElementById('fSpe').value;

            const filtered = fullData.filter(i => {
                return (activeCompany === 'Tutte' || i.azienda === activeCompany) &&
                       (!fMat || i.descrizione_tipo_materiale === fMat) &&
                       (!fCol || i.descrizione_colore === fCol) &&
                       (!fLar || i.larghezza === fLar) &&
                       (!fSpe || i.spessore === fSpe);
            });

            const tbody = document.getElementById('main-tbody');
            const mobile = document.getElementById('mobile-container');
            tbody.innerHTML = ''; mobile.innerHTML = '';

            filtered.forEach(item => {
                const lotti = formatLotti(item.giacenza_codice_fornitore);
                const azClass = `bg-${item.azienda.toLowerCase()}`;
                
                const htmlTable = `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4">
                            <span class="azienda-tag ${azClass}">${item.azienda}</span>
                            <div class="font-black text-slate-800 text-sm uppercase">${item.descrizione_tipo_materiale}</div>
                            <div class="text-[10px] text-slate-500 uppercase font-medium">${item.descrizione_colore} - ${item.tipo_verniciatura}</div>
                        </td>
                        <td class="p-4 text-center font-mono text-xs text-slate-600">${item.larghezza} x ${item.spessore}</td>
                        <td class="p-4 text-center">
                            <div class="font-black text-blue-600 text-base">${item.qta_giacenza_ml}</div>
                            <div class="text-[9px] text-gray-400 uppercase">IMPEGNATO: ${item.qta_impegnata_ml}</div>
                        </td>
                        <td class="p-4">
                            <div onclick="this.parentElement.classList.toggle('open')" class="cursor-pointer">
                                <span class="bg-white px-2 py-1 rounded border shadow-sm text-[10px] font-bold text-slate-700 inline-flex items-center">
                                    ${lotti.primo} ${lotti.extra > 0 ? `<span class="ml-2 bg-red-100 text-red-600 px-1 rounded">+${lotti.extra}</span>` : ''}
                                    <i class="fa-solid fa-chevron-down ml-2 arrow-icon opacity-30"></i>
                                </span>
                                <div class="collapsible-content space-y-1">
                                    ${lotti.tutti.map(l => `<div class="text-[10px] py-1 border-b border-gray-100 text-slate-500 font-mono">${l}</div>`).join('')}
                                </div>
                            </div>
                        </td>
                    </tr>`;
                
                const htmlMobile = `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="h-1 ${azClass}"></div>
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="azienda-tag ${azClass}">${item.azienda}</span>
                                    <div class="font-black text-slate-800 text-lg leading-none mt-1 uppercase">${item.descrizione_tipo_materiale}</div>
                                    <div class="text-xs text-slate-500 font-bold uppercase mt-1">${item.descrizione_colore}</div>
                                </div>
                                <div class="text-right min-w-[100px]">
                                    <div class="bg-blue-50 p-2 rounded-xl">
                                        <div class="text-xl font-black text-blue-700 leading-none">${item.qta_giacenza_ml}</div>
                                        <div class="text-[8px] font-black text-blue-400 uppercase mt-1 tracking-tighter">GIACENZA ML</div>
                                    </div>
                                    <div class="mt-1 pr-2">
                                        <div class="text-[12px] font-black text-red-500 leading-none">${item.qta_impegnata_ml}</div>
                                        <div class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">IMPEGNATO ML</div>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-[10px] font-bold bg-gray-50 p-2 rounded-lg mb-3 uppercase text-slate-600">
                                <div><span class="text-gray-400 mr-1">LAR:</span>${item.larghezza}</div>
                                <div><span class="text-gray-400 mr-1">SPE:</span>${item.spessore}</div>
                                <div class="col-span-2"><span class="text-gray-400 mr-1">VERN:</span>${item.tipo_verniciatura}</div>
                            </div>
                            <div onclick="this.classList.toggle('open')">
                                <div class="flex justify-between items-center text-[10px] font-black text-slate-400 border-t pt-2 cursor-pointer">
                                    <span>LOTTI GIACENZA(${lotti.totali})</span>
                                    <i class="fa-solid fa-chevron-down arrow-icon"></i>
                                </div>
                                <div class="collapsible-content grid grid-cols-2 gap-1 pt-2">
                                    ${lotti.tutti.map(l => `<div class="bg-gray-50 p-1.5 rounded text-[9px] font-mono border border-gray-100 text-slate-500">${l}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;

                tbody.insertAdjacentHTML('beforeend', htmlTable);
                mobile.insertAdjacentHTML('beforeend', htmlMobile);
            });
        }

        function formatLotti(val) {
            if (!val) return { primo: '-', extra: 0, tutti: [], totali: 0 };
            const lista = Array.isArray(val) ? val : String(val).split(',').map(s => s.trim());
            return { primo: lista[0], extra: lista.length - 1, tutti: lista, totali: lista.length };
        }

        function applyFilters() { render(); }
        window.onload = init;
    </script>
    
</body>
</html>
